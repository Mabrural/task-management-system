<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Management System</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📋 Task Manager</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="pages/tasks.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span>Tasks</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <span id="userEmail">Loading...</span>
                    </div>
                </div>
                <button id="logoutBtn" class="btn btn-danger btn-sm btn-block">
                    🚪 Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="navbar">
                <h1>Dashboard</h1>
                <div class="navbar-actions">
                    <button id="refreshBtn" class="btn btn-secondary">
                        🔄 Refresh
                    </button>
                </div>
            </header>

            <!-- Dashboard Stats -->
            <div class="dashboard-stats" id="dashboardStats">
                <div class="stat-card">
                    <p>Loading statistics...</p>
                </div>
            </div>

            <!-- Recent Tasks -->
            <div class="card" style="margin: 0 20px 20px;">
                <div class="card-header">
                    <h3>Task Terbaru</h3>
                    <a href="pages/tasks.html" class="btn btn-primary btn-sm">Lihat Semua</a>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Judul</th>
                                    <th>Status</th>
                                    <th>Priority</th>
                                    <th>Dibuat</th>
                                </tr>
                            </thead>
                            <tbody id="taskTableBody">
                                <tr>
                                    <td colspan="5" style="text-align: center;">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Task</h3>
                <button class="modal-close" onclick="document.getElementById('taskModal').style.display='none'">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    
                    <div class="form-group">
                        <label for="title">Judul Task *</label>
                        <input type="text" id="title" required placeholder="Masukkan judul task">
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Deskripsi</label>
                        <textarea id="description" rows="3" placeholder="Masukkan deskripsi (opsional)"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority">
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="document.getElementById('taskModal').style.display='none'">Batal</button>
                <button class="btn btn-primary" id="saveTaskBtn">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>Konfirmasi Hapus</h3>
                <button class="modal-close" onclick="document.getElementById('confirmModal').style.display='none'">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="document.getElementById('confirmModal').style.display='none'">Batal</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Hapus</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================
        // DASHBOARD SCRIPT - VERSI PERBAIKAN
        // ============================================
        
        import authService from './assets/js/auth.js';
        import taskService from './assets/js/task.js';
        import ui from './assets/js/ui.js';
        import { showNotification, debugLog } from './assets/js/utils.js';

        // Debug mode
        localStorage.setItem('debug', 'true');
        
        console.log('Dashboard script loaded');

        // ============================================
        // Fungsi untuk mendapatkan current user dengan aman
        // ============================================
        async function getCurrentUserSafely() {
            // Tunggu auth siap
            const user = await authService.waitForAuth();
            
            if (!user) {
                console.error('No authenticated user found');
                showNotification('Session tidak ditemukan. Silakan login ulang.', 'error');
                
                // Redirect ke login setelah delay
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
                return null;
            }
            
            console.log('Current user:', {
                uid: user.uid,
                email: user.email
            });
            
            return user;
        }

        // ============================================
        // Inisialisasi Dashboard
        // ============================================
        async function initDashboard() {
            try {
                console.log('Initializing dashboard...');
                
                // Get current user dengan aman
                const user = await getCurrentUserSafely();
                if (!user) return;
                
                // Update user info di sidebar
                const userEmailEl = document.getElementById('userEmail');
                if (userEmailEl) {
                    userEmailEl.textContent = user.email;
                }
                
                console.log('Loading statistics for user:', user.uid);
                
                // Load statistics
                const stats = await taskService.getTaskStatistics(user.uid);
                console.log('Statistics loaded:', stats);
                ui.renderDashboardStats(stats);
                
                // Load recent tasks
                console.log('Loading recent tasks...');
                const recentTasks = await taskService.getTasks(user.uid);
                const recentFive = recentTasks.slice(0, 5);
                console.log('Recent tasks loaded:', recentFive.length);
                ui.renderTaskTable(recentFive);
                
                console.log('Dashboard initialization complete');
                
            } catch (error) {
                console.error('Dashboard initialization error:', error);
                showNotification('Gagal memuat dashboard: ' + error.message, 'error');
            }
        }

        // ============================================
        // Event Listeners
        // ============================================
        
        // Logout button
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            if (confirm('Apakah Anda yakin ingin logout?')) {
                authService.logout();
            }
        });

        // Refresh button
        document.getElementById('refreshBtn')?.addEventListener('click', () => {
            initDashboard();
            showNotification('Dashboard diperbarui!', 'success');
        });

        // Save Task (Create/Update)
        document.getElementById('saveTaskBtn')?.addEventListener('click', async () => {
            try {
                console.log('Save task button clicked');
                
                // Get form data
                const taskId = document.getElementById('taskId').value;
                const title = document.getElementById('title').value;
                const description = document.getElementById('description').value;
                const status = document.getElementById('status').value;
                const priority = document.getElementById('priority').value;
                
                // Validasi
                if (!title || !title.trim()) {
                    showNotification('Judul task wajib diisi!', 'error');
                    return;
                }
                
                // Get current user
                const user = await getCurrentUserSafely();
                if (!user) {
                    showNotification('Session tidak valid. Silakan login ulang.', 'error');
                    return;
                }
                
                console.log('Saving task for user:', user.uid);
                
                // Disable save button selama proses
                const saveBtn = document.getElementById('saveTaskBtn');
                saveBtn.disabled = true;
                saveBtn.textContent = 'Menyimpan...';
                
                try {
                    if (taskId) {
                        // Update existing task
                        console.log('Updating task:', taskId);
                        await taskService.updateTask(taskId, {
                            title: title.trim(),
                            description: description.trim(),
                            status,
                            priority
                        });
                        showNotification('Task berhasil diupdate!', 'success');
                    } else {
                        // Create new task
                        console.log('Creating new task');
                        const taskData = {
                            title: title.trim(),
                            description: description.trim(),
                            status,
                            priority,
                            user_id: user.uid
                        };
                        console.log('Task data:', taskData);
                        
                        await taskService.createTask(taskData);
                        showNotification('Task berhasil dibuat!', 'success');
                    }
                    
                    // Hide modal
                    document.getElementById('taskModal').style.display = 'none';
                    
                    // Refresh dashboard
                    await initDashboard();
                    
                } finally {
                    // Enable button kembali
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Simpan';
                }
                
            } catch (error) {
                console.error('Error saving task:', error);
                showNotification('Gagal menyimpan task: ' + error.message, 'error');
            }
        });

        // Confirm Delete
        document.getElementById('confirmDeleteBtn')?.addEventListener('click', async () => {
            const taskId = document.getElementById('confirmDeleteBtn').getAttribute('data-task-id');
            
            if (taskId) {
                try {
                    console.log('Deleting task:', taskId);
                    await taskService.deleteTask(taskId);
                    showNotification('Task berhasil dihapus!', 'success');
                    document.getElementById('confirmModal').style.display = 'none';
                    await initDashboard();
                } catch (error) {
                    console.error('Error deleting task:', error);
                    showNotification('Gagal menghapus task!', 'error');
                }
            }
        });

        // Fungsi global untuk edit dan delete
        window.editTask = async (taskId) => {
            try {
                console.log('Editing task:', taskId);
                const task = await taskService.getTaskById(taskId);
                
                // Isi form
                document.getElementById('taskId').value = task.id;
                document.getElementById('title').value = task.title || '';
                document.getElementById('description').value = task.description || '';
                document.getElementById('status').value = task.status || 'Pending';
                document.getElementById('priority').value = task.priority || 'Medium';
                document.getElementById('modalTitle').textContent = 'Edit Task';
                
                // Tampilkan modal
                document.getElementById('taskModal').style.display = 'block';
                
            } catch (error) {
                console.error('Error loading task for edit:', error);
                showNotification('Gagal memuat task!', 'error');
            }
        };
        
        window.deleteTask = (taskId, taskTitle) => {
            console.log('Preparing to delete:', taskId, taskTitle);
            document.getElementById('confirmMessage').textContent = 
                `Apakah Anda yakin ingin menghapus task "${taskTitle}"?`;
            document.getElementById('confirmDeleteBtn').setAttribute('data-task-id', taskId);
            document.getElementById('confirmModal').style.display = 'block';
        };

        // Close modals when clicking outside
        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };

        // Tambah task button (jika ada)
        const addTaskBtn = document.getElementById('addTaskBtn');
        if (addTaskBtn) {
            addTaskBtn.addEventListener('click', () => {
                // Reset form
                document.getElementById('taskForm').reset();
                document.getElementById('taskId').value = '';
                document.getElementById('modalTitle').textContent = 'Tambah Task Baru';
                document.getElementById('taskModal').style.display = 'block';
            });
        }

        // ============================================
        // Start dashboard ketika auth sudah siap
        // ============================================
        window.addEventListener('authReady', (event) => {
            console.log('Auth ready event received:', event.detail);
            initDashboard();
        });

        // Juga jalankan langsung (sebagai fallback)
        // Gunakan setTimeout untuk memastikan semua module loaded
        setTimeout(() => {
            if (authService.isAuthenticated()) {
                console.log('User already authenticated, initializing...');
                initDashboard();
            } else {
                console.log('Waiting for auth...');
                // Auth listener akan menangani ini
            }
        }, 500);
        
        console.log('Dashboard script setup complete');
    </script>
</body>
</html>
