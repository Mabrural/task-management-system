<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Task Management System</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📋 Task Manager</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="../dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="tasks.html" class="nav-item active">
                    <span class="nav-icon">📝</span>
                    <span>Tasks</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <span id="userEmail">user@email.com</span>
                    </div>
                </div>
                <button id="logoutBtn" class="btn btn-danger btn-sm btn-block">
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Navbar -->
            <header class="navbar">
                <h1>Tasks Management</h1>
                <div class="navbar-actions">
                    <button id="addTaskBtn" class="btn btn-primary">
                        ➕ Tambah Task
                    </button>
                    <button id="refreshBtn" class="btn btn-secondary">
                        🔄 Refresh
                    </button>
                </div>
            </header>

            <!-- Filters -->
            <div class="filters-bar">
                <div class="filters-row">
                    <div class="filter-group">
                        <label>Search</label>
                        <div class="search-box">
                            <input 
                                type="text" 
                                id="searchInput" 
                                placeholder="Cari task..."
                            >
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="filterStatus">
                            <option value="All">Semua</option>
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Priority</label>
                        <select id="filterPriority">
                            <option value="">Semua</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Sort By</label>
                        <select id="sortBy">
                            <option value="newest">Terbaru</option>
                            <option value="oldest">Terlama</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Tasks Table -->
            <div class="card" style="margin: 0 20px 20px;">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Judul</th>
                                    <th>Deskripsi</th>
                                    <th>Status</th>
                                    <th>Priority</th>
                                    <th>Dibuat</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="taskTableBody">
                                <tr>
                                    <td colspan="7" style="text-align: center;">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Task</h3>
                <button class="modal-close" onclick="ui.hideTaskModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    
                    <div class="form-group">
                        <label for="title">Judul Task *</label>
                        <input type="text" id="title" required placeholder="Masukkan judul task">
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Deskripsi</label>
                        <textarea id="description" rows="3" placeholder="Masukkan deskripsi (opsional)"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority">
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="ui.hideTaskModal()">Batal</button>
                <button class="btn btn-primary" id="saveTaskBtn">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>Konfirmasi Hapus</h3>
                <button class="modal-close" onclick="ui.hideConfirmModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="ui.hideConfirmModal()">Batal</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Hapus</button>
            </div>
        </div>
    </div>

    <script type="module">
        import authService from '../assets/js/auth.js';
        import taskService from '../assets/js/task.js';
        import ui from '../assets/js/ui.js';
        import { showNotification, debounce } from '../assets/js/utils.js';

        // Global references
        window.ui = ui;
        window.editTask = async (taskId) => {
            try {
                const task = await taskService.getTaskById(taskId);
                ui.showTaskModal(task);
            } catch (error) {
                showNotification('Gagal memuat task!', 'error');
            }
        };
        
        window.deleteTask = (taskId, taskTitle) => {
            ui.showConfirmModal(taskId, taskTitle);
        };

        // State
        let currentTasks = [];
        let currentUser = null;

        // ============================================
        // Load Tasks
        // ============================================
        async function loadTasks() {
            try {
                if (!currentUser) return;

                const filters = {
                    status: document.getElementById('filterStatus').value,
                    priority: document.getElementById('filterPriority').value,
                    sortBy: document.getElementById('sortBy').value
                };

                // Get all tasks
                let tasks = await taskService.getTasks(currentUser.uid, filters);

                // Client-side search
                const searchTerm = document.getElementById('searchInput').value;
                tasks = taskService.searchTasks(tasks, searchTerm);

                currentTasks = tasks;
                ui.renderTaskTable(tasks);
            } catch (error) {
                console.error('Error loading tasks:', error);
                showNotification('Gagal memuat tasks!', 'error');
            }
        }

        // ============================================
        // Initialize Page
        // ============================================
        async function initPage() {
            currentUser = authService.getCurrentUser();
            if (!currentUser) {
                showNotification('Silakan login terlebih dahulu!', 'warning');
                return;
            }

            ui.updateUserInfo(currentUser.email);
            await loadTasks();
        }

        // ============================================
        // Event Listeners
        // ============================================

        // Add Task Button
        document.getElementById('addTaskBtn')?.addEventListener('click', () => {
            ui.showTaskModal();
        });

        // Refresh Button
        document.getElementById('refreshBtn')?.addEventListener('click', async () => {
            await loadTasks();
            showNotification('Data diperbarui!', 'success');
        });

        // Logout Button
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            if (confirm('Apakah Anda yakin ingin logout?')) {
                authService.logout();
            }
        });

        // Save Task
        document.getElementById('saveTaskBtn')?.addEventListener('click', async () => {
            const taskId = document.getElementById('taskId').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const status = document.getElementById('status').value;
            const priority = document.getElementById('priority').value;

            if (!title.trim()) {
                showNotification('Judul task wajib diisi!', 'error');
                return;
            }

            try {
                if (taskId) {
                    await taskService.updateTask(taskId, { title, description, status, priority });
                    showNotification('Task berhasil diupdate!', 'success');
                } else {
                    await taskService.createTask({
                        title,
                        description,
                        status,
                        priority,
                        user_id: currentUser.uid
                    });
                    showNotification('Task berhasil dibuat!', 'success');
                }

                ui.hideTaskModal();
                await loadTasks();
            } catch (error) {
                showNotification('Gagal menyimpan task: ' + error.message, 'error');
            }
        });

        // Confirm Delete
        document.getElementById('confirmDeleteBtn')?.addEventListener('click', async () => {
            const taskId = document.getElementById('confirmDeleteBtn').getAttribute('data-task-id');
            
            if (taskId) {
                try {
                    await taskService.deleteTask(taskId);
                    showNotification('Task berhasil dihapus!', 'success');
                    ui.hideConfirmModal();
                    await loadTasks();
                } catch (error) {
                    showNotification('Gagal menghapus task!', 'error');
                }
            }
        });

        // Search with debounce
        document.getElementById('searchInput')?.addEventListener('input', debounce(() => {
            loadTasks();
        }, 300));

        // Filter changes
        document.getElementById('filterStatus')?.addEventListener('change', loadTasks);
        document.getElementById('filterPriority')?.addEventListener('change', loadTasks);
        document.getElementById('sortBy')?.addEventListener('change', loadTasks);

        // Close modals on outside click
        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };

        // Start page
        initPage();
    </script>
</body>
</html>
